<!-- src/app/UI/home/home.html -->
<app-header></app-header>

<div class="main-content">

  <!-- Welcome -->
  <div class="welcome-section">
    <h1 class="welcome-title">Welcome back, {{ username }}</h1>
    <p class="welcome-sub">What would you like to do today?</p>
  </div>

  <!-- SUPPORT only: All Tickets -->
  <div *ngIf="isSupport" class="card-nav-full" (click)="goToAllTickets()">
    <div class="card-icon">&#128203;</div>
    <h2>All Tickets</h2>
    <p>View and manage all open issues across the organisation</p>
    <div class="card-arrow">&#8594;</div>
  </div>

  <!-- Cards for all users -->
  <div class="card-grid">
    <div class="card-nav" (click)="goToMyTickets()">
      <div class="card-icon blue">&#127915;</div>
      <h2>My Tickets</h2>
      <p>Track the progress of your registered issues</p>
      <div class="card-arrow">&#8594;</div>
    </div>
    <div class="card-nav" (click)="goToReporting()">
      <div class="card-icon orange">&#9888;&#65039;</div>
      <h2>Report an Issue</h2>
      <p>Services, hardware or software have stopped working</p>
      <div class="card-arrow">&#8594;</div>
    </div>
  </div>

</div>

<app-footer></app-footer>
