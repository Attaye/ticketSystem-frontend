<!-- src/app/UI/all-tickets/all-tickets.html -->
<app-header></app-header>

<div class="page-nav">
  <span class="breadcrumb">Home &gt; AllTickets</span>
  <button class="btn-back" (click)="goBack()">back</button>
</div>

<div class="main-content">
  <div class="ticket-table-container">

    <div class="table-title">All Tickets</div>

    <div class="table-header">
      <span>Number</span>
      <span>Titel</span>
      <span>Opened</span>
      <span>status</span>
      <span>Discription</span>
    </div>

    <div
      *ngFor="let ticket of allTickets"
      class="ticket-row"
      (click)="openTicket(ticket.id)"
    >
      <span>{{ ticket.number }}</span>
      <span>{{ ticket.title }}</span>
      <!-- NUR EINE Zeile für Datum: -->
      <span>{{ ticket.createdAt?.substring(0, 10) }}</span>
      <!-- Zeile 29 mit date pipe LÖSCHEN! -->
      <span>
  <span class="status-badge" [ngClass]="getStatusClass(ticket.status)">
    {{ ticket.status }}
  </span>
</span>
      <span>{{ ticket.description }}</span>
    </div>

    <div *ngIf="allTickets.length === 0"
         style="padding:20px; color:var(--text-muted); text-align:center;">
      No tickets found.
    </div>

  </div>
</div>

<app-footer></app-footer>
