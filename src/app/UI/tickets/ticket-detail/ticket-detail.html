<!-- src/app/UI/tickets/ticket-detail/ticket-detail.html -->
<app-header></app-header>

<div class="page-nav">
  <span class="breadcrumb">Home &gt; Tickets &gt; {{ ticket?.number }}</span>
  <button class="btn-back" (click)="goBack()">back</button>
</div>

<div class="main-content">
  <div class="form-card" *ngIf="ticket">

    <h1 style="text-align:center; font-size:1.8rem; font-weight:700; margin-bottom:28px;">
      {{ ticket.number }}
    </h1>

    <div class="form-row" style="margin-bottom:20px;">
      <div class="form-group">
        <label>Opend by</label>
        <input class="form-control" type="text" [value]="ticket.openedBy" readonly />
      </div>
      <div class="form-group">
        <label>Title</label>
        <input class="form-control" type="text" [value]="ticket.title" readonly />
      </div>
    </div>

    <div class="form-group">
      <label>Detailed description</label>
      <textarea class="form-control" [value]="ticket.description" readonly></textarea>
    </div>

    <div class="form-group">
      <label>comments</label>
      <div class="comments-list">
        <div *ngFor="let comment of ticket.comments" class="comment-item">
          {{ comment }}
        </div>
        <div *ngIf="!ticket.comments || ticket.comments.length === 0"
             style="color:var(--text-muted); font-size:0.85rem;">
          No comments yet.
        </div>
      </div>
      <div class="comment-input-row">
        <input
          type="text"
          [(ngModel)]="newComment"
          placeholder="Add a comment..."
          (keyup.enter)="addComment()"
        />
        <button class="btn-send" (click)="addComment()">&#10148;</button>
      </div>
    </div>

  </div>
</div>

<app-footer></app-footer>
